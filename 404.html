<style>

.kort{max-width:480px}
img{width:130px;border-radius:24px;margin-bottom:1rem}
.kod{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--mint-strong);
}
h1{font-family:'Fredoka',sans-serif;color:var(--navy);font-size:clamp(1.6rem,5vw,2.2rem);margin:.4rem 0 .7rem}
p{margin-bottom:1.4rem}
.btn{
  display:inline-block;padding:.85rem 1.6rem;border-radius:999px;
  font-family:'Fredoka',sans-serif;font-weight:600;text-decoration:none;
  background:var(--navy);color:#fff;box-shadow:0 6px 18px rgba(29,42,77,.25);
}
.lankar{margin-top:1.4rem;font-size:.95rem}
.lankar a{color:var(--lavender-strong);font-weight:700;margin:0 .5rem}
